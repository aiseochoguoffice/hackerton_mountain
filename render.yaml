# Render Blueprint — https://render.com/docs/blueprint-spec
# GitHub 연동 후 Dashboard → New → Blueprint 로 배포하거나,
# Web Service 수동 생성 시 아래 startCommand / envVars 참고.

services:
  - type: web
    name: mountain-safety-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: MOUNTAIN_FORECAST_API_URL
        value: https://apihub.kma.go.kr/api/typ02/openApi/MountainFcstService/getMountainFcst
      - key: MOUNTAIN_FORECAST_API_KEY
        sync: false
